<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Big Stack Invite — Tour Board</title>
<style>
  :root{
    --bg:#081710; --panel:#0e2418; --panel2:#123021; --line:#1d4230;
    --gold:#d9b64e; --gold-dim:#9c8330; --txt:#eef3ee; --muted:#8fa89a;
    --red:#ff6057; --green:#54d98c; --blue:#7fb3ff;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:radial-gradient(1200px 600px at 50% -10%, #10311f 0%, var(--bg) 60%);
    color:var(--txt); font-family:"Helvetica Neue", Arial, sans-serif;
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }
  header{
    padding:14px 22px 10px; border-bottom:2px solid var(--gold-dim);
    display:flex; align-items:center; gap:18px; flex-wrap:wrap;
    background:linear-gradient(180deg, rgba(217,182,78,.07), transparent);
  }
  .crest{
    width:46px;height:46px;border:2px solid var(--gold);border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--gold);
    flex:0 0 auto;
  }
  .title h1{
    font-size:clamp(18px,2.6vw,30px); letter-spacing:.14em; font-weight:800;
    color:var(--gold); text-transform:uppercase; white-space:nowrap;
  }
  .title .sub{font-size:clamp(10px,1.2vw,13px); letter-spacing:.22em; color:var(--muted); text-transform:uppercase; margin-top:2px;}
  .purse{margin-left:auto; text-align:right;}
  .purse .lbl{font-size:10px;letter-spacing:.25em;color:var(--muted);text-transform:uppercase;}
  .purse .amt{font-size:clamp(20px,2.4vw,30px);font-weight:800;color:var(--gold);}
  nav{
    display:flex; gap:6px; padding:8px 18px; border-bottom:1px solid var(--line);
    background:rgba(0,0,0,.25); flex-wrap:wrap; align-items:center;
  }
  nav button{
    background:transparent; border:1px solid transparent; color:var(--muted);
    font-size:12px; letter-spacing:.18em; text-transform:uppercase; font-weight:700;
    padding:8px 14px; cursor:pointer; border-radius:4px;
  }
  nav button:hover{color:var(--txt);}
  nav button.active{color:var(--gold); border-color:var(--gold-dim); background:rgba(217,182,78,.08);}
  nav .spacer{flex:1;}
  nav .util{font-size:11px; letter-spacing:.1em; border:1px solid var(--line); color:var(--muted);}
  nav .util:hover{border-color:var(--gold-dim); color:var(--gold);}
  main{flex:1; overflow:auto; padding:16px 22px 28px;}
  h2.section{
    font-size:13px; letter-spacing:.28em; color:var(--gold); text-transform:uppercase;
    margin:6px 0 12px; font-weight:800;
  }
  .boardwrap{overflow-x:auto;}
  table.board{width:100%; border-collapse:collapse; font-variant-numeric:tabular-nums;}
  table.board th{
    font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted);
    padding:8px 10px; text-align:left; border-bottom:1px solid var(--line); white-space:nowrap;
  }
  table.board td{
    padding:9px 10px; border-bottom:1px solid rgba(29,66,48,.55); font-size:15px; white-space:nowrap;
  }
  table.board tr.leader td{background:rgba(217,182,78,.10);}
  table.board tr.leader td:first-child{border-left:3px solid var(--gold);}
  .pos{font-weight:800; color:var(--gold); width:44px;}
  .pname{font-weight:700; letter-spacing:.04em; text-transform:uppercase;}
  .under{color:var(--red); font-weight:800;}
  .over{color:var(--blue);}
  .even{color:var(--txt);}
  .dim{color:var(--muted);}
  .money{color:var(--green); font-weight:700;}
  .grid18 th, .grid18 td{text-align:center; padding:6px 6px; font-size:13px;}
  .grid18 td.hole-birdie{color:var(--red); font-weight:800;}
  .grid18 td.hole-eagle{color:var(--red); font-weight:800; text-decoration:underline;}
  .grid18 td.hole-bogey{color:var(--blue);}
  .cardpanel{
    background:var(--panel); border:1px solid var(--line); border-radius:8px;
    padding:14px 16px; margin-bottom:16px;
  }
  .flexrow{display:flex; gap:16px; flex-wrap:wrap;}
  .flexrow > .cardpanel{flex:1 1 340px; min-width:300px;}
  input[type=text], input[type=number], input[type=date]{
    background:#0a1c12; color:var(--txt); border:1px solid var(--line); border-radius:4px;
    padding:5px 7px; font-size:13px; width:100%;
  }
  input.scorecell{width:44px; text-align:center; font-size:15px; padding:6px 2px;}
  input.scorecell:focus{outline:2px solid var(--gold-dim);}
  input:disabled{opacity:.45;}
  .setup-grid{display:grid; grid-template-columns:auto 1fr; gap:8px 12px; align-items:center; font-size:13px;}
  .setup-grid label{color:var(--muted); font-size:11px; letter-spacing:.12em; text-transform:uppercase; white-space:nowrap;}
  .toggle{display:inline-flex; align-items:center; gap:8px; cursor:pointer; font-size:13px;}
  .banner{
    background:rgba(217,182,78,.08); border:1px solid var(--gold-dim); border-radius:6px;
    color:var(--gold); font-size:12px; letter-spacing:.08em; padding:8px 12px; margin-bottom:14px;
  }
  .skinwin{color:var(--gold); font-weight:800;}
  .footer-note{font-size:11px; color:var(--muted); letter-spacing:.06em; margin-top:10px;}
  .btn{
    background:var(--panel2); color:var(--txt); border:1px solid var(--line); border-radius:5px;
    padding:8px 14px; font-size:12px; letter-spacing:.12em; text-transform:uppercase; font-weight:700; cursor:pointer;
  }
  .btn:hover{border-color:var(--gold-dim); color:var(--gold);}
  .btn.danger:hover{border-color:var(--red); color:var(--red);}
  .teamchip{
    display:inline-block; background:var(--panel2); border:1px solid var(--line);
    border-radius:4px; padding:2px 8px; font-size:11px; color:var(--muted); letter-spacing:.08em;
  }
  .bignum{font-size:clamp(26px,3.2vw,40px); font-weight:800; color:var(--gold);}
  @media (max-width:700px){ body{overflow:auto;} main{padding:10px;} }
</style>
</head>
<body>
<header>
  <div class="crest">⛳</div>
  <div class="title">
    <h1 id="hdrTitle">Old Works Invitational</h1>
    <div class="sub" id="hdrSub"></div>
  </div>
  <div class="purse">
    <div class="lbl">Total Purse</div>
    <div class="amt" id="hdrPurse">$0</div>
  </div>
</header>
<nav id="tabs"></nav>
<main id="view"></main>

<script>
'use strict';
/* ================= STATE ================= */
const LS_KEY = 'owib_dashboard_v1';
const MAXP = 24;

const DEFAULT_STATE = {
  eventName: 'The Big Stack Invite',
  course: {
    name:'Old Works Golf Course', date:'2026-08-14', tee:'Gold',
    slope:129, rating:73.8,
    pars:[4,3,5,4,5,4,5,3,3, 4,3,5,4,4,4,5,4,3],
    si:  [11,17,3,7,1,5,13,9,15, 8,16,4,12,2,10,6,18,14],
    yards:[424,334,555,361,570,389,427,388,358, 395,177,409,459,411,202,440,380,390]
  },
  buyins: {chicago:20, par3:5, net:5, gross:5, skins:5, scramble:10}, // $40 AM + $10 optional PM scramble
  players: [], // {name, index}
  ghost: {enabled:false, hcp:0, mirrorSlot:null},  // mirrorSlot: null = par ghost, else copies that player's card
  scores: [],  // scores[slot][hole] = int|null
  scramble: {
    teeName:'Tips', slope:129, rating:73.8,   // set from the tips card
    size:4, pcts:'25,20,15,10',               // allowance % applied low-hcp to high
    assign:{},                                 // slot -> team number override
    scores:{}                                  // teamNum -> [18 gross]
  },
  chicagoAssign:{},   // slot -> chicago team number (empty = pair by roster order)
  scrambleIn:{},      // slot -> false when a player skips the PM scramble
  amGroup:{},         // slot -> tee group 1-5
  teetimes:['7:20','7:30','7:40','7:50','8:10','8:20'],
  sync:{sheetId:'1r47V-wUcWgEOgjR_UtMaPjErhZX-XMH-9EBz8o-enl4', lastAt:null, err:null},
  tab: 'leaderboard',
  auto: false
};

function freshScores(){ return Array.from({length:MAXP},()=>Array(18).fill(null)); }

let state = load();
function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){
      const s = JSON.parse(raw);
      if(s && s.course && s.scores){
        s.auto = false;
        // migrate pre-scramble saves
        if(s.buyins.scramble === undefined) s.buyins = JSON.parse(JSON.stringify(DEFAULT_STATE.buyins));
        if(!s.scramble) s.scramble = JSON.parse(JSON.stringify(DEFAULT_STATE.scramble));
        if(s.ghost.mirrorSlot === undefined) s.ghost.mirrorSlot = null;
        if(s.eventName === 'Old Works Invitational') s.eventName = 'The Big Stack Invite';
        if(!s.chicagoAssign) s.chicagoAssign = {};
        if(!s.scrambleIn) s.scrambleIn = {};
        if(!s.amGroup) s.amGroup = {};
        if(!s.teetimes || s.teetimes.length < 6) s.teetimes = ['7:20','7:30','7:40','7:50','8:10','8:20'];
        if(!s.sync) s.sync = {sheetId:'', lastAt:null, err:null};
        if(!s.sync.sheetId) s.sync.sheetId = '1r47V-wUcWgEOgjR_UtMaPjErhZX-XMH-9EBz8o-enl4';
        while(s.scores.length < MAXP) s.scores.push(Array(18).fill(null));
        return s;
      }
    }
  }catch(e){}
  const s = JSON.parse(JSON.stringify(DEFAULT_STATE));
  s.players = demoRoster();
  s.scores = freshScores();
  return s;
}
function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){} }

function demoRoster(){
  return [
    {name:'Wes Parkinson',      index:14.2},
    {name:'Sandy Bunker',       index:8.5},
    {name:'Mike Shanks',        index:18.6},
    {name:'Tommy Threeputt',    index:12.0},
    {name:'Divot Dave Duffer',  index:22.4},
    {name:'Chip N. Runn',       index:6.8},
    {name:'Chuck Chunker',      index:16.1},
    {name:'Lip-Out Larry',      index:10.3},
    {name:'Gimme Jimmy',        index:9.9},
    {name:'Snowman Stan',       index:20.5},
    {name:'Mulligan Murphy',    index:13.4},
    {name:'Hook McGraw',        index:7.2},
    {name:'Yippy Gibbs',        index:19.8},
    {name:'Justin Therough',    index:11.6},
    {name:'Wormburner Willy',   index:24.1},
    {name:'Otto B. Better',     index:5.4},
    {name:'Foot Wedge Fred',    index:17.3},
    {name:'Frank Wanker',       index:9.1},
    {name:'Breakfast Ball Bruce', index:15.7},
    {name:'Shankopotamus Sam',  index:21.2}
  ];
}

/* ================= GOLF MATH ================= */
function courseHcp(index){
  if(index===null || index===undefined || index==='') return 0;
  return Math.round(Number(index) * Number(state.course.slope) / 113);
}
function strokesOnHole(hcp, si){
  let s = 0;
  if(hcp >= si) s++;
  if(hcp >= si + 18) s++;
  return s;
}
function chicagoPts(net, par){
  const d = net - par;
  if(d <= -2) return 5;
  if(d === -1) return 3;
  if(d === 0) return 2;
  if(d === 1) return 1;
  return 0;
}
function activePlayers(){
  const out = [];
  state.players.forEach((p, slot)=>{
    if(p && p.name && p.name.trim() !== '' && slot < MAXP)
      out.push({slot, name:p.name.trim(), index:Number(p.index)||0, hcp:courseHcp(p.index)});
  });
  return out.slice(0, MAXP);
}
function ghostActive(){
  return state.ghost.enabled && activePlayers().length % 2 === 1;
}
function ghostTeammate(){
  // the player left without a partner (who the ghost will join)
  const ps = activePlayers();
  if(ps.length % 2 === 0) return null;
  const byTeam = new Map(); const un = [];
  ps.forEach(p=>{
    const t = Number(state.chicagoAssign[p.slot]) || 0;
    if(t >= 1){ if(!byTeam.has(t)) byTeam.set(t, []); byTeam.get(t).push(p); }
    else un.push(p);
  });
  un.forEach(p=>{
    let t = 1;
    while((byTeam.get(t)||[]).length >= 2) t++;
    if(!byTeam.has(t)) byTeam.set(t, []);
    byTeam.get(t).push(p);
  });
  const solo = [...byTeam.keys()].sort((a,b)=>a-b).find(t=>byTeam.get(t).length===1);
  return solo === undefined ? null : byTeam.get(solo)[0];
}
function ghostMirror(){
  // the player whose card the ghost replays; must not be the ghost's own teammate
  const ms = state.ghost.mirrorSlot;
  if(ms === null || ms === undefined || ms === '') return null;
  const ps = activePlayers();
  const src = ps.find(p => p.slot === Number(ms));
  if(!src) return null;
  const mate = ghostTeammate();
  if(mate && mate.slot === src.slot) return null;      // can't team with yourself
  return src;
}
function ghostRow(){
  const src = ghostMirror();
  if(src) return {slot:'GHOST', name:'Ghost of '+src.name, index:src.index, hcp:src.hcp, isGhost:true, mirror:src};
  return {slot:'GHOST', name:'The Ghost', index:null, hcp:Number(state.ghost.hcp)||0, isGhost:true, mirror:null};
}
function grossFor(p, h){
  if(p.isGhost){
    if(p.mirror) return grossFor(p.mirror, h);         // replay the assigned player's card
    return state.course.pars[h];                       // par ghost fallback
  }
  const v = state.scores[p.slot][h];
  return (v===null || v==='' || v===undefined) ? null : Number(v);
}
function netFor(p, h){
  const g = grossFor(p, h);
  if(g===null) return null;
  return g - strokesOnHole(p.hcp, state.course.si[h]);
}

function computeAll(){
  const ps = activePlayers();
  const pars = state.course.pars;

  // per-player stats
  const stats = ps.map(p=>{
    let gross=0, net=0, thru=0, parPlayed=0, p3net=0, p3n=0, chi=0;
    const holes=[];
    for(let h=0; h<18; h++){
      const g = grossFor(p,h), n = netFor(p,h);
      holes.push({g, n});
      if(g!==null){
        gross+=g; net+=n; thru++; parPlayed+=pars[h];
        chi += chicagoPts(n, pars[h]);
        if(pars[h]===3){ p3net+=n; p3n++; }
      }
    }
    return {p, holes, gross, net, thru, toPar:gross-parPlayed, netToPar:net-parPlayed,
            par3Net:p3net, par3Thru:p3n, chi};
  });

  const par3Count = pars.filter(x=>x===3).length;

  // Chicago teams: explicit assignments win; unassigned players pair up in roster order
  const withGhost = ghostActive();
  const byTeam = new Map();
  const unassigned = [];
  ps.forEach(p=>{
    const t = Number(state.chicagoAssign[p.slot]) || 0;
    if(t >= 1){ if(!byTeam.has(t)) byTeam.set(t, []); byTeam.get(t).push(p); }
    else unassigned.push(p);
  });
  unassigned.forEach(p=>{
    let t = 1;
    while((byTeam.get(t)||[]).length >= 2) t++;
    if(!byTeam.has(t)) byTeam.set(t, []);
    byTeam.get(t).push(p);
  });
  if(withGhost){
    const solo = [...byTeam.keys()].sort((a,b)=>a-b).find(t=>byTeam.get(t).length===1);
    if(solo !== undefined) byTeam.get(solo).push(ghostRow());
  }
  const teamList = [...byTeam.keys()].sort((a,b)=>a-b)
    .map(t=>({num:t, a:byTeam.get(t)[0]||null, b:byTeam.get(t)[1]||null}));
  const ghostStats = withGhost ? (()=> {
    const p = ghostRow();
    let chi=0; const holePts=[];
    for(let h=0;h<18;h++){ const n=netFor(p,h); const pts=chicagoPts(n,pars[h]); chi+=pts; holePts.push(pts); }
    return {p, chi, holePts};
  })() : null;

  function statFor(member){
    if(!member) return null;
    if(member.isGhost) return ghostStats;
    return stats.find(s=>s.p.slot===member.slot);
  }
  const teams = teamList.map(t=>{
    const sa = statFor(t.a), sb = statFor(t.b);
    const pts = (sa?sa.chi:0) + (sb?sb.chi:0);
    const holePts = Array.from({length:18},(_,h)=>{
      let v = 0, any=false;
      [t.a,t.b].forEach(m=>{
        if(!m) return;
        if(m.isGhost){ v += ghostStats.holePts[h]; any=true; }
        else{
          const n = netFor(m,h);
          if(n!==null){ v += chicagoPts(n,pars[h]); any=true; }
        }
      });
      return any ? v : null;
    });
    return {...t, pts, holePts};
  });

  // pools (real players only pay)
  const n = ps.length;
  const pools = {
    chicago: state.buyins.chicago * n,
    par3:    state.buyins.par3 * n,
    net:     state.buyins.net * n,
    gross:   state.buyins.gross * n,
    skins:   state.buyins.skins * n,
    scramble: 0   // set below — only actual scramble entrants pay
  };

  // ---- afternoon scramble (from the tips, opt-in) ----
  const sc = state.scramble;
  const scPlayers = ps.filter(p => state.scrambleIn[p.slot] !== false);
  pools.scramble = state.buyins.scramble * scPlayers.length;
  const scSize = Math.max(2, Number(sc.size)||4);
  const scHcp = p => Math.round((Number(p.index)||0) * (Number(sc.slope)||113) / 113);
  const scTeamOf = (p, i) => Number(sc.assign[p.slot]) || Math.ceil((i+1)/scSize);
  const scTeamNums = [...new Set(scPlayers.map((p,i)=>scTeamOf(p,i)))].sort((a,b)=>a-b);
  const pcts = String(sc.pcts||'').split(',').map(x=>Number(x.trim())).filter(x=>!isNaN(x));
  const scTeams = scTeamNums.map(tn=>{
    const members = scPlayers.filter((p,i)=>scTeamOf(p,i)===tn)
                      .map(p=>({...p, sHcp:scHcp(p)}))
                      .sort((a,b)=>a.sHcp-b.sHcp);
    const teamHcp = Math.round(members.reduce((sum,m,j)=>sum + m.sHcp * ((pcts[j]||0)/100), 0));
    const sScores = (sc.scores[tn]||Array(18).fill(null));
    let gross=0, thru=0, parPlayed=0;
    for(let h=0;h<18;h++){
      const v=sScores[h];
      if(v!==null && v!=='' && v!==undefined){ gross+=Number(v); thru++; parPlayed+=pars[h]; }
    }
    return {num:tn, members, teamHcp, scores:sScores, gross, thru,
            toPar:gross-parPlayed, net: thru===18 ? gross-teamHcp : null};
  });
  const scDone = scTeams.filter(t=>t.thru===18);
  let scW = {winners:[], best:null};
  if(scDone.length){
    const best = Math.min(...scDone.map(t=>t.net));
    scW = {winners:scDone.filter(t=>t.net===best), best};
  }

  // skins: outright low NET per hole, real players only
  const skins = [];
  for(let h=0; h<18; h++){
    const entries = stats.filter(s=>s.holes[h].g!==null);
    if(entries.length===0){ skins.push({hole:h, state:'open'}); continue; }
    let min = Math.min(...entries.map(s=>s.holes[h].n));
    const winners = entries.filter(s=>s.holes[h].n===min);
    if(winners.length===1) skins.push({hole:h, state:'won', winner:winners[0].p, net:min});
    else skins.push({hole:h, state:'tie', net:min, count:winners.length});
  }
  const skinsWon = skins.filter(s=>s.state==='won');
  const skinValue = skinsWon.length ? pools.skins / skinsWon.length : 0;

  // winners (complete cards only for gross/net/par3; chicago all-holes-in)
  const finished = stats.filter(s=>s.thru===18);
  function lowSplit(list, key){
    if(!list.length) return {winners:[], best:null};
    const best = Math.min(...list.map(s=>s[key]));
    return {winners:list.filter(s=>s[key]===best), best};
  }
  const grossW = lowSplit(finished, 'gross');
  const netW   = lowSplit(finished, 'net');
  const p3done = stats.filter(s=>s.par3Thru===par3Count);
  const par3W  = lowSplit(p3done, 'par3Net');
  const allDone = ps.length>0 && finished.length===ps.length;
  let chiW = {winners:[], best:null};
  if(teams.length){
    const best = Math.max(...teams.map(t=>t.pts));
    chiW = {winners:teams.filter(t=>t.pts===best), best};
  }

  // money list
  const money = new Map(); ps.forEach(p=>money.set(p.slot, 0));
  const add=(slot,amt)=>money.set(slot,(money.get(slot)||0)+amt);
  grossW.winners.forEach(s=>add(s.p.slot, pools.gross/grossW.winners.length));
  netW.winners.forEach(s=>add(s.p.slot, pools.net/netW.winners.length));
  par3W.winners.forEach(s=>add(s.p.slot, pools.par3/par3W.winners.length));
  skinsWon.forEach(s=>add(s.winner.slot, skinValue));
  if(chiW.winners.length){
    const perTeam = pools.chicago / chiW.winners.length;
    chiW.winners.forEach(t=>{
      const real = [t.a,t.b].filter(m=>m && !m.isGhost);
      real.forEach(m=>add(m.slot, perTeam/real.length));
    });
  }
  if(scW.winners.length){
    const perTeam = pools.scramble / scW.winners.length;
    scW.winners.forEach(t=> t.members.forEach(m=>add(m.slot, perTeam/t.members.length)));
  }

  return {stats, teams, pools, skins, skinsWon, skinValue,
          grossW, netW, par3W, chiW, par3Count, allDone, money, withGhost,
          scTeams, scW, scSize};
}

/* ================= FORMAT HELPERS ================= */
const fmt$ = v => '$' + (Math.round(v*100)/100).toLocaleString(undefined,{maximumFractionDigits:2});
function fmtPar(d, played){
  if(!played) return '<span class="dim">—</span>';
  if(d < 0) return `<span class="under">${d}</span>`;
  if(d === 0) return `<span class="even">E</span>`;
  return `<span class="over">+${d}</span>`;
}
function rankRows(rows, valFn, asc=true){
  const sorted=[...rows].sort((a,b)=> asc? valFn(a)-valFn(b) : valFn(b)-valFn(a));
  let lastVal=null, lastRank=0;
  return sorted.map((r,i)=>{
    const v=valFn(r);
    const rank = (v===lastVal)? lastRank : i+1;
    lastVal=v; lastRank=rank;
    const tied = sorted.filter(x=>valFn(x)===v).length>1;
    return {row:r, rank, label:(tied?'T':'')+rank};
  });
}
const esc = s => String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

const TABS = [
  ['leaderboard','Leaderboard'], ['chicago','Chicago'], ['skins','Skins'],
  ['par3','Par 3'], ['scramble','Scramble'], ['groups','Groups'], ['payouts','Payouts'],
  ['scores','Enter Scores'], ['setup','Setup'], ['sync','Sync']
];
let autoTimer = null;

function render(){
  renderHeader();
  renderTabs();
  const R = computeAll();
  const v = document.getElementById('view');
  switch(state.tab){
    case 'leaderboard': v.innerHTML = viewLeaderboard(R); break;
    case 'chicago':     v.innerHTML = viewChicago(R); break;
    case 'skins':       v.innerHTML = viewSkins(R); break;
    case 'par3':        v.innerHTML = viewPar3(R); break;
    case 'scramble':    v.innerHTML = viewScramble(R); wireScramble(); break;
    case 'groups':      v.innerHTML = viewGroups(R); break;
    case 'sync':        v.innerHTML = viewSync(R); wireSync(); break;
    case 'payouts':     v.innerHTML = viewPayouts(R); break;
    case 'scores':      v.innerHTML = viewScores(R); wireScoreInputs(); break;
    case 'setup':       v.innerHTML = viewSetup(R); wireSetup(); break;
  }
  save();
}
function renderHeader(){
  const c = state.course;
  document.getElementById('hdrTitle').textContent = state.eventName;
  document.getElementById('hdrSub').textContent =
    `${c.name} · ${c.tee} Tees · Slope ${c.slope} / Rating ${c.rating} · ${c.date}`;
  const n = activePlayers().length;
  const total = Object.values(state.buyins).reduce((a,b)=>a+Number(b||0),0) * n;
  document.getElementById('hdrPurse').textContent = fmt$(total);
}
function renderTabs(){
  const nav = document.getElementById('tabs');
  nav.innerHTML = TABS.map(([id,lbl])=>
    `<button class="${state.tab===id?'active':''}" onclick="setTab('${id}')">${lbl}</button>`).join('')
    + `<span class="spacer"></span>
       <button class="util" onclick="toggleAuto()">${state.auto?'📺 Auto: ON':'📺 Auto'}</button>
       <button class="util" onclick="simulateScores()">🎲 Simulate</button>
       <button class="util danger" onclick="clearScores()">Clear Scores</button>`;
}
function setTab(t){ state.tab=t; render(); }
function toggleAuto(){
  state.auto = !state.auto;
  if(autoTimer){ clearInterval(autoTimer); autoTimer=null; }
  if(state.auto){
    const cyc = ['leaderboard','chicago','skins','par3','payouts'];
    autoTimer = setInterval(()=>{
      const i = cyc.indexOf(state.tab);
      state.tab = cyc[(i+1) % cyc.length];
      render();
    }, 12000);
  }
  render();
}

function wireScramble(){
  const bind=(id,fn)=>{ const el=document.getElementById(id); if(el) el.addEventListener('change',e=>{fn(e.target); render();}); };
  bind('scTee',   t=>state.scramble.teeName=t.value);
  bind('scSlope', t=>state.scramble.slope=Number(t.value)||113);
  bind('scRating',t=>state.scramble.rating=Number(t.value)||72);
  bind('scSize',  t=>state.scramble.size=Math.max(2,Number(t.value)||4));
  bind('scPcts',  t=>state.scramble.pcts=t.value);
  document.querySelectorAll('[data-scin]').forEach(cb=>{
    cb.addEventListener('change', e=>{
      state.scrambleIn[e.target.dataset.scin] = e.target.checked ? true : false;
      render();
    });
  });
  document.querySelectorAll('[data-scassign]').forEach(sel=>{
    sel.addEventListener('change', e=>{
      state.scramble.assign[e.target.dataset.scassign] = Number(e.target.value);
      render();
    });
  });
  document.querySelectorAll('[data-scteam]').forEach(inp=>{
    inp.addEventListener('input', e=>{
      const tn=e.target.dataset.scteam, h=+e.target.dataset.h;
      if(!state.scramble.scores[tn]) state.scramble.scores[tn]=Array(18).fill(null);
      const v=e.target.value;
      state.scramble.scores[tn][h] = (v==='')? null : Math.max(1, Math.min(20, parseInt(v)||1));
      save();
    });
    inp.addEventListener('change', ()=>render());
    inp.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); render(); } });
  });
}

function wireSetup(){
  const bind=(id,fn)=>{ const el=document.getElementById(id); if(el) el.addEventListener('change',e=>{fn(e.target); render();}); };
  bind('suEvent', t=>state.eventName=t.value);
  bind('suCourse',t=>state.course.name=t.value);
  bind('suDate',  t=>state.course.date=t.value);
  bind('suTee',   t=>state.course.tee=t.value);
  bind('suSlope', t=>state.course.slope=Number(t.value)||113);
  bind('suRating',t=>state.course.rating=Number(t.value)||72);
  ['chicago','par3','net','gross','skins','scramble'].forEach(k=>
    bind('suB'+k, t=>state.buyins[k]=Number(t.value)||0));
  bind('suGhost',   t=>state.ghost.enabled=t.checked);
  bind('suGhostHcp',t=>state.ghost.hcp=Number(t.value)||0);
  bind('suGhostMirror', t=>state.ghost.mirrorSlot = t.value===''? null : Number(t.value));
  document.querySelectorAll('[data-ros]').forEach(inp=>{
    inp.addEventListener('change', e=>{
      const i=+e.target.dataset.i, k=e.target.dataset.ros;
      if(!state.players[i]) state.players[i]={name:'',index:''};
      state.players[i][k] = k==='index' ? (e.target.value===''?'':Number(e.target.value)) : e.target.value;
      render();
    });
  });
  document.querySelectorAll('[data-crs]').forEach(inp=>{
    inp.addEventListener('change', e=>{
      const h=+e.target.dataset.h, k=e.target.dataset.crs;
      state.course[k][h]=Number(e.target.value)||state.course[k][h];
      render();
    });
  });
}

/* ================= GROUPS VIEW ================= */
function viewGroups(R){
  const ps = activePlayers();
  const groups = new Map();
  ps.forEach((p,i)=>{
    const g = Number(state.amGroup[p.slot]) || Math.ceil((i+1)/4);
    if(!groups.has(g)) groups.set(g, []);
    groups.get(g).push(p);
  });
  const cards = [...groups.keys()].sort((a,b)=>a-b).map(g=>{
    const t = state.teetimes[g-1] || '—';
    const members = groups.get(g).map(p=>{
      const team = Number(state.chicagoAssign[p.slot]) || '';
      return `<tr><td class="pname">${esc(p.name)}</td><td class="dim">${p.hcp}</td>
        <td><span class="teamchip">${team?('T'+team):'—'}</span></td></tr>`;
    }).join('');
    return `<div class="cardpanel" style="flex:1 1 240px">
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <span style="color:var(--gold-l,#de9c5c);font-weight:800;letter-spacing:.12em">GROUP ${g}</span>
        <span class="bignum" style="font-size:24px">${t}</span>
      </div>
      <table class="board" style="margin-top:8px">
        <tr><th>Player</th><th>Hcp</th><th>Chi Team</th></tr>${members}</table>
    </div>`;
  }).join('');
  return `<h2 class="section">Morning Wave — Tee Groups</h2>
    <div class="banner">Set each player's group in Setup (or the Sheet's am_group column). Chicago partners usually ride together — two teams per group.</div>
    <div class="flexrow">${cards || '<div class="dim">No players.</div>'}</div>`;
}

/* ================= MATCHERS ================= */
function pairChicagoBalanced(){
  const ps = [...activePlayers()].sort((a,b)=>a.hcp-b.hcp);
  state.chicagoAssign = {};
  const n = ps.length;
  for(let i=0; i<Math.floor(n/2); i++){
    state.chicagoAssign[ps[i].slot] = i+1;             // best...
    state.chicagoAssign[ps[n-1-i].slot] = i+1;         // ...with worst
  }
  if(n % 2) state.chicagoAssign[ps[Math.floor(n/2)].slot] = Math.floor(n/2)+1;
  render();
}
function pairChicagoRandom(){
  const ps = [...activePlayers()];
  for(let i=ps.length-1; i>0; i--){ const j=Math.floor(Math.random()*(i+1)); [ps[i],ps[j]]=[ps[j],ps[i]]; }
  state.chicagoAssign = {};
  ps.forEach((p,i)=> state.chicagoAssign[p.slot] = Math.floor(i/2)+1);
  render();
}
function scrambleSerpentine(){
  const ps = [...activePlayers()].filter(p=>state.scrambleIn[p.slot]!==false)
    .sort((a,b)=>a.hcp-b.hcp);
  const T = Math.max(1, Math.ceil(ps.length / Math.max(2, Number(state.scramble.size)||4)));
  state.scramble.assign = {};
  ps.forEach((p,i)=>{
    const round = Math.floor(i/T);
    const pos = i % T;
    state.scramble.assign[p.slot] = (round % 2 === 0 ? pos : T-1-pos) + 1;
  });
  render();
}
function scrambleRandom(){
  const ps = [...activePlayers()].filter(p=>state.scrambleIn[p.slot]!==false);
  for(let i=ps.length-1; i>0; i--){ const j=Math.floor(Math.random()*(i+1)); [ps[i],ps[j]]=[ps[j],ps[i]]; }
  const size = Math.max(2, Number(state.scramble.size)||4);
  state.scramble.assign = {};
  ps.forEach((p,i)=> state.scramble.assign[p.slot] = Math.floor(i/size)+1);
  render();
}
function copyAssignments(){
  const ps = activePlayers();
  const lines = ps.map((p,i)=>{
    const chi = Number(state.chicagoAssign[p.slot]) || Math.floor(i/2)+1;
    const grp = Number(state.amGroup[p.slot]) || Math.ceil((i+1)/4);
    const sin = state.scrambleIn[p.slot]===false ? 'N' : 'Y';
    const sct = Number(state.scramble.assign[p.slot]) || '';
    return `${p.name}\t${p.index}\t${chi}\t${grp}\t${sin}\t${sct}`;
  });
  const txt = 'name\tghin_index\tchicago_team\tam_group\tscramble_in\tscramble_team\n' + lines.join('\n');
  navigator.clipboard.writeText(txt).then(
    ()=>alert('Copied! Paste into the ROSTER tab of the Sheet (cell A1) — columns line up.'),
    ()=>prompt('Copy this and paste into the Sheet ROSTER tab:', txt));
}

/* ================= GOOGLE SHEET SYNC (read-only, gviz) ================= */
let syncTimer = null;
async function fetchTab(tab){
  const url = `https://docs.google.com/spreadsheets/d/${state.sync.sheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tab)}&headers=1`;
  const r = await fetch(url);
  if(!r.ok) throw new Error(tab+': HTTP '+r.status);
  const text = await r.text();
  const m = text.match(/setResponse\(([\s\S]*)\);?\s*$/);
  if(!m) throw new Error(tab+': unexpected response (is the Sheet link-shared?)');
  const j = JSON.parse(m[1]);
  const cols = j.table.cols.map(c=>(c.label||'').trim().toLowerCase());
  return j.table.rows.map(row=>{
    const o = {};
    row.c.forEach((cell,i)=>{ o[cols[i]] = cell ? (cell.v ?? null) : null; });
    return o;
  });
}
function applySheetData(setupRows, rosterRows, amRows, scRows){
  // SETUP key/value
  const kv = {};
  setupRows.forEach(r=>{ if(r.key) kv[String(r.key).trim()] = r.value; });
  if(kv.event_name) state.eventName = String(kv.event_name);
  if(kv.course_name) state.course.name = String(kv.course_name);
  if(kv.tee) state.course.tee = String(kv.tee);
  if(kv.slope) state.course.slope = Number(kv.slope);
  if(kv.rating) state.course.rating = Number(kv.rating);
  if(kv.tips_slope) state.scramble.slope = Number(kv.tips_slope);
  if(kv.tips_rating) state.scramble.rating = Number(kv.tips_rating);
  ['chicago','gross','net','par3','skins','scramble'].forEach(k=>{
    if(kv['buyin_'+k] !== undefined && kv['buyin_'+k] !== null) state.buyins[k] = Number(kv['buyin_'+k]);
  });
  if(kv.ghost_enabled !== undefined) state.ghost.enabled = String(kv.ghost_enabled).toUpperCase()==='YES';
  if(kv.scramble_team_size) state.scramble.size = Number(kv.scramble_team_size);
  if(kv.scramble_pcts) state.scramble.pcts = String(kv.scramble_pcts);
  for(let i=1;i<=6;i++) if(kv['teetime_'+i]) state.teetimes[i-1] = String(kv['teetime_'+i]);
  for(let h=1;h<=18;h++){
    if(kv['par_'+h]) state.course.pars[h-1] = Number(kv['par_'+h]);
    if(kv['si_'+h]) state.course.si[h-1] = Number(kv['si_'+h]);
  }
  // ROSTER (row order = slot order)
  const clean = rosterRows.filter(r=>r.name && String(r.name).trim() && !String(r.name).startsWith('^'));
  state.players = clean.slice(0,MAXP).map(r=>({name:String(r.name).trim(), index:Number(r.ghin_index)||0}));
  state.chicagoAssign = {}; state.amGroup = {}; state.scrambleIn = {}; state.scramble.assign = {};
  clean.slice(0,MAXP).forEach((r,slot)=>{
    if(r.chicago_team) state.chicagoAssign[slot] = Number(r.chicago_team);
    if(r.am_group) state.amGroup[slot] = Number(r.am_group);
    if(r.scramble_in !== null && r.scramble_in !== undefined && String(r.scramble_in).toUpperCase().startsWith('N'))
      state.scrambleIn[slot] = false;
    if(r.scramble_team) state.scramble.assign[slot] = Number(r.scramble_team);
  });
  // ghost mirror by name (needs roster loaded first)
  if(kv.ghost_mirror !== undefined){
    const nm = String(kv.ghost_mirror||'').trim().toLowerCase();
    const hit = state.players.findIndex(p=>p.name.toLowerCase()===nm);
    state.ghost.mirrorSlot = hit >= 0 ? hit : null;
  }
  // AM SCORES by matching name (duplicate names consume roster slots in order)
  state.scores = freshScores();
  const usedSlots = new Set();
  amRows.forEach(r=>{
    if(!r.name) return;
    const nm = String(r.name).trim().toLowerCase();
    const slot = state.players.findIndex((p,i)=>p.name.toLowerCase()===nm && !usedSlots.has(i));
    if(slot < 0) return;
    usedSlots.add(slot);
    for(let h=1;h<=18;h++){
      const v = r['h'+h];
      state.scores[slot][h-1] = (v===null||v===undefined||v==='') ? null : Number(v);
    }
  });
  // SCRAMBLE SCORES by team number
  state.scramble.scores = {};
  scRows.forEach(r=>{
    const tn = Number(r.team);
    if(!tn) return;
    state.scramble.scores[tn] = Array.from({length:18},(_,i)=>{
      const v = r['h'+(i+1)];
      return (v===null||v===undefined||v==='') ? null : Number(v);
    });
  });
}
async function syncNow(){
  if(!state.sync.sheetId) return;
  try{
    const [su, ro, am, sc] = await Promise.all([
      fetchTab('SETUP'), fetchTab('ROSTER'), fetchTab('AM SCORES'), fetchTab('SCRAMBLE SCORES')]);
    applySheetData(su, ro, am, sc);
    state.sync.lastAt = new Date().toLocaleTimeString();
    state.sync.err = null;
  }catch(e){
    state.sync.err = String(e.message || e);
  }
  if(!document.activeElement || document.activeElement.tagName !== 'INPUT') render();
}
function startSync(){
  if(syncTimer){ clearInterval(syncTimer); syncTimer = null; }
  if(state.sync.sheetId){ syncNow(); syncTimer = setInterval(syncNow, 30000); }
}

function viewSync(R){
  const s = state.sync;
  const status = !s.sheetId ? '<span class="dim">Not connected — local mode.</span>'
    : s.err ? `<span style="color:var(--red)">Error: ${esc(s.err)}</span>`
    : s.lastAt ? `<span style="color:var(--green)">● LIVE — last sync ${esc(s.lastAt)}, refreshes every 30s</span>`
    : '<span class="dim">Connecting…</span>';
  return `<h2 class="section">Google Sheet Sync</h2>
    <div class="cardpanel" style="max-width:760px">
      <div class="setup-grid">
        <label>Sheet ID</label><input type="text" id="syncId" value="${esc(s.sheetId)}" placeholder="the long code between /d/ and /edit in the Sheet URL">
      </div>
      <div style="margin:12px 0">${status}</div>
      <div style="display:flex;gap:10px">
        <button class="btn" onclick="startSync()">Connect / Refresh Now</button>
        <button class="btn danger" onclick="(function(){state.sync.sheetId='';startSync();render();})()">Disconnect</button>
      </div>
      <div class="footer-note">When connected, the Sheet is the source of truth: roster, handicaps, teams, groups, buy-ins, and all scores flow FROM the Sheet every 30 seconds — score entry here is disabled. Scorekeepers edit the Sheet on their phones; this board just watches.
      <br><br>Setup: upload BigStack_Score_Sheet_Template.xlsx to your personal Drive → File → Save as Google Sheets → Share → Anyone with the link → Editor → paste the Sheet ID above.</div>
    </div>`;
}
function wireSync(){
  const el = document.getElementById('syncId');
  if(el) el.addEventListener('change', e=>{ state.sync.sheetId = e.target.value.trim(); save(); startSync(); });
}

/* ================= ACTIONS ================= */
function simulateScores(){
  const ps = activePlayers();
  if(!ps.length){ alert('Add players in Setup first.'); return; }
  ps.forEach(p=>{
    for(let h=0; h<18; h++){
      const par = state.course.pars[h];
      state.scores[p.slot][h] = simHole(par, p.hcp);
    }
  });
  // afternoon scramble: one team ball, usually at or under par
  const R = computeAll();
  R.scTeams.forEach(t=>{
    state.scramble.scores[t.num] = state.course.pars.map(par=>{
      const r = Math.random();
      const d = r<0.08 ? -2 : r<0.45 ? -1 : r<0.85 ? 0 : 1;
      return Math.max(1, par+d);
    });
  });
  state.tab='leaderboard';
  render();
}
function simHole(par, hcp){
  // realistic-ish: better players skew low
  const skill = Math.min(hcp,36)/36;             // 0 scratch-ish .. 1 hacker
  let w;
  if(par===3) w = [0.5, 8+6*(1-skill), 38, 32+10*skill, 14+8*skill, 5+6*skill];
  else        w = [1+2*(1-skill), 9+8*(1-skill), 34, 30+10*skill, 16+9*skill, 6+8*skill];
  const diffs=[-2,-1,0,1,2,3];
  const tot=w.reduce((a,b)=>a+b,0);
  let r=Math.random()*tot;
  for(let i=0;i<w.length;i++){ r-=w[i]; if(r<=0) return Math.max(1, par+diffs[i]); }
  return par+3;
}
function clearScores(){
  if(!confirm('Clear all entered scores? (Roster and setup stay.)')) return;
  state.scores = freshScores(); render();
}
function fullReset(){
  if(!confirm('Full reset — course, roster, buy-ins, and scores go back to defaults. Sure?')) return;
  localStorage.removeItem(LS_KEY);
  state = load(); render();
}
function loadDemoRoster(){
  state.players = demoRoster(); state.scores = freshScores(); render();
}
function exportCSV(){
  const R = computeAll();
  let csv = 'Player,Hcp,'+Array.from({length:18},(_,i)=>'H'+(i+1)).join(',')+',Gross,Net,Chicago Pts,Par3 Net,Money\n';
  R.stats.forEach(s=>{
    const money = R.money.get(s.p.slot)||0;
    csv += `"${s.p.name}",${s.p.hcp},`+s.holes.map(h=>h.g===null?'':h.g).join(',')+
           `,${s.gross||''},${s.net||''},${s.chi},${s.par3Net||''},${money}\n`;
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='tournament_results.csv'; a.click(); URL.revokeObjectURL(a.href);
}

/* expose for console/testing */
window.__golf = {get state(){return state;}, computeAll, render, simulateScores, applySheetData, syncNow};
render();
startSync();
